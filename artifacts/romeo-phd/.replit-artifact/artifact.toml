kind = "web"
previewPath = "/"
title = "Romeo PHD 6.0"
version = "1.0.0"
id = "artifacts/romeo-phd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21689
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/romeo-phd run dev"

[services.env]
PORT = "21689"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/romeo-phd", "run", "build"]
publicDir = "artifacts/romeo-phd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
