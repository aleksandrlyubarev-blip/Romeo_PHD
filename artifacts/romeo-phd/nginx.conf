# nginx config for @workspace/romeo-phd runtime image.
#
# Responsibilities:
#   - Serve the Vite-built SPA with client-side routing (Wouter).
#   - Reverse-proxy /api/ to the api-server container on the compose network.
#   - Preserve Server-Sent Events on /api/pipelines/:id/execute (no buffering,
#     24h read timeout so long-running pipelines don't get cut mid-stream).
#   - Cache fingerprinted assets aggressively, never cache index.html.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for fingerprinted Vite assets (dist/public/assets/*).
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the shell so a fresh deploy is picked up on next reload.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
        try_files $uri =404;
    }

    # Reverse proxy to the Express api-server. Hostname `api-server`
    # resolves inside the docker-compose network.
    location /api/ {
        proxy_pass http://api-server:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: /api/pipelines/:id/execute streams events for the duration
        # of the pipeline. Disable response buffering and give the stream
        # a long read timeout so nginx doesn't drop it.
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  24h;
        proxy_send_timeout  24h;

        # Let the client close the stream cleanly.
        proxy_set_header Connection "";
    }

    # SPA fallback: every non-file route goes to index.html and Wouter
    # takes over on the client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
